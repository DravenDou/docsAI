services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: bussi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bussi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bussi}
      POSTGRES_DB: ${POSTGRES_DB:-bussi}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bussi} -d ${POSTGRES_DB:-bussi}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
